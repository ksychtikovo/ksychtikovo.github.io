<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ksychtíkovo | Malování na obličej Vsetín & Valmez</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />

    <style>
        :root {
            --primary: #ff6666;
            --secondary: #ff9999;
            --accent: #ac1f1f;
            --bg: #fcfbfb;
            --text: #333;
            --fb-blue: #1877F2;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* Navigace */
        .navbar {
            background-color: var(--primary);
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1100px;
            margin: 0 auto;
        }
        .logo {
            font-family: 'Luckiest Guy', cursive;
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
        }
        .nav-menu {
            list-style: none;
            display: flex;
            gap: 15px;
            margin: 0;
            padding: 0;
        }
        .nav-menu a {
            color: white;
            text-decoration: none;
            font-weight: 600;
        }
        .fb-nav {
            background: white;
            color: var(--fb-blue) !important;
            padding: 5px 10px;
            border-radius: 20px;
        }

        /* Sekce */
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        header { 
            background: var(--secondary); 
            color: white; 
            padding: 60px 20px; 
            text-align: center;
        }
        h1 { font-family: 'Luckiest Guy', cursive; font-size: 3.5rem; margin: 0; }
        h2 { font-family: 'Luckiest Guy', cursive; color: var(--primary); text-align: center; font-size: 2.2rem; }

        /* Články Grid */
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .article-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-decoration: none;
            color: inherit;
            border: 1px solid #eee;
            transition: 0.3s;
        }
        .article-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .article-card h3 { color: var(--primary); margin-top: 0; }

        /* Tlačítka */
        .button {
            display: inline-block;
            padding: 15px 30px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-family: 'Luckiest Guy', cursive;
            margin: 10px 0;
        }
        .button-fb { background: var(--fb-blue); }
